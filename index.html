<!DOCTYPE html>
<html>
<head>
  <title>Mini Bank App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <h2>VaultBank Login</h2>

  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p onclick="showCreate()" style="cursor:pointer; margin-top:10px;">
    Create new account
  </p>
</div>

<!-- CREATE ACCOUNT -->
<div class="container" id="createBox" style="display:none;">
  <h2>Create Account</h2>

  <input id="newUser" placeholder="Username">
  <input id="newPass" type="password" placeholder="Password">

  <button onclick="createAccount()">Create</button>
  <p onclick="showLogin()" style="cursor:pointer;">Back to login</p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard" style="display:none;">
  <h2>Dashboard</h2>

  <h3>Welcome, <span id="currentUser"></span></h3>

  <div class="card">
    <h3>Balance</h3>
    <h1 id="balance">₦0</h1>
<h3>Transfer Money</h3>

<input id="transferTo" placeholder="Send to username">
<input id="transferAmount" type="number" placeholder="Amount">
<button onclick="transfer()">Send Money</button>

<h3>Transaction History</h3>
<div id="historyBox"></div>
  </div>

  <input id="amount" type="number" placeholder="Enter amount">

  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
